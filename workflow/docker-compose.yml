services:

  forgejo:
    image: codeberg.org/forgejo/forgejo:14
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./.data/forgejo:/data             # host bind-mount so CDC can read gitea.db
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/v1/version"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  nats:
    image: nats:latest
    restart: unless-stopped
    command: --jetstream --store_dir /data
    volumes:
      - nats-data:/data
    ports:
      - "4223:4222"   # 4223 to avoid conflict with any existing NATS on 4222

volumes:
  nats-data:
